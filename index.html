<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>music player design by  me</title>
        <link rel="stylesheet" href="style.css">
        <script src="https://kit.fontawesome.com/7795fd7ce4.js" crossorigin="anonymous"></script>
    </head>
    <body>
    
        <div class="container">

            <div class="music-player">
                 <nav>
                    <div class="circle"><i class="fa-solid fa-angle-left"></i></div>
                    
                    <div class="circle"><i class="fa-solid fa-bars"></i></div>
                    
                 </nav>
                 <img src="my-images/download.jpegpics.jpeg" class="img-pics" width="130">
                 <h1 style="font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;" >peter kamalu</h1>
                 <p>edsheeran perfect</p>
                 <audio controls id="song" style="margin: top 8px; ">
                    <source src=" media.mp3/Ed Sheeran - Perfect  (DawnFoxes.com).mp3">
                 </audio>
                 
                 <input type="range" value="0" id="progress" style="cursor: pointer; transform: scale(1.4);">
                    <div class="controls">
                        <div><i class="fa-solid fa-backward"></i></div>
                        <div onclick ="playPause()"><i class="fa-solid fa-play" id="ctrlIcon"></i></div>
                        <div><i class="fa-solid fa-forward"></i></div>
                    </div>
            
            </div>
                      
           
        </div>
        <script>
            let progress = document.getElementById("progress");
            let song = document.getElementById("song");
            let ctrlIcon = document.getElementById("ctrlIcon");

            song.onloadedmetadata = function(){
                progress.max =  song.duration;
                progress.value = song.currentTime;

            }

            function playPause(){
                if (ctrlIcon.classlist.contains("fa-pause")){

                    song.pause();
                    ctrlIcon.classList.remove("fa-pause");
                    ctrlIcon.classList.add("fa-play")
                }
                else{
                    song.play();
                    ctrlIcon.classList.add("fa-pause");
                    ctrlIcon.classList.remove("fa-play");
                }

                
            }

            if (song.play()){
                setInterval(()=>{
                    progress.value = song.currentTime;
                },500);

                progress.onchange = function(){
                    song.play();
                    song.currentTime = progress.value;
                    ctrlIcon.classList.add("fa-pause");
                    ctrlIcon.classList.remove("fa-play");
                }
            }

            

        
        </script>
    
    </body>
</html>
